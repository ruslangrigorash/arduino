        function calculatePrices(retailPrice, quantity, color) {
            if (quantity === 0) {
                return { retailTotal: 0, myTotal: 0 };
            }

            let paintCost = 0;
            if (color === 'white') {
                paintCost = retailPrice * 0.05;
            } else if (color === 'custom') {
                paintCost = retailPrice * 0.10;
            }

            const myBasePrice = retailPrice * 0.65;
            const importFee = myBasePrice * 0.09;

            const retailTotal = (retailPrice + paintCost + importFee) * quantity;
            const myTotal = (myBasePrice + paintCost + importFee) * quantity;

            return { 
                retailTotal, 
                myTotal,
                breakdown: {
                    retail: retailPrice,
                    paint: paintCost,
                    myBase: myBasePrice,
                    import: importFee,
                    quantity: quantity
                }
            };
        }

                    <span class="toggle">▼</span>
                `;
                categoryTitle.onclick = () => toggleCategory(catIndex);

                const tableWrapper = document.createElement('div');
                tableWrapper.id = `category-${catIndex}`;
                
                const table = document.createElement('table');
                table.className = 'products-table';

                const thead = document.createElement('thead');
                thead.innerHTML = `
                    <tr>
                        <th>Product Code</th>
                        <th>Description</th>
                        <th>Retail Price</th>
                        <th>Qty</th>
                        <th>Color</th>
                        <th>Retail Total<br><span style="font-size:0.8em">(with import)</span></th>
                        <th>My Price Total<br><span style="font-size:0.8em">(with import)</span></th>
                    </tr>
                `;

                const tbody = document.createElement('tbody');
                category.items.forEach((item, itemIndex) => {
                    const row = document.createElement('tr');
                    
                    const colorSelect = item.hasColor ? `
                        <select id="color-${catIndex}-${itemIndex}" onchange="updateTotals()">
                            <option value="black">Black</option>
                            <option value="white">White (+5%)</option>
                            <option value="custom">Custom (+10%)</option>
                        </select>
                    ` : '<span style="color:#95a5a6">N/A</span>';

                    row.innerHTML = `
                        <td><div class="product-name">${item.code}</div></td>
                        <td><div class="product-desc">${item.desc}</div></td>
                        <td>$${item.price.toLocaleString()}</td>
                        <td><input type="number" id="qty-${catIndex}-${itemIndex}" min="0" value="0" onchange="updateTotals()"></td>
                        <td>${colorSelect}</td>
                        <td><div class="price retail-price" id="retail-${catIndex}-${itemIndex}">$0.00</div><div class="price-breakdown" id="breakdown-retail-${catIndex}-${itemIndex}"></div></td>
                        <td><div class="price my-price" id="my-${catIndex}-${itemIndex}">$0.00</div><div class="price-breakdown" id="breakdown-my-${catIndex}-${itemIndex}"></div></td>
                    `;

                    tbody.appendChild(row);
                });

                table.appendChild(thead);
                table.appendChild(tbody);
                tableWrapper.appendChild(table);

                categoryDiv.appendChild(categoryTitle);
                categoryDiv.appendChild(tableWrapper);
                categoriesDiv.appendChild(categoryDiv);
            });
        }

        function toggleCategory(index) {
            const categoryContent = document.getElementById(`category-${index}`);
            const toggleIcon = document.querySelectorAll('.toggle')[index];
            
            if (categoryContent.classList.contains('collapsed')) {
                categoryContent.classList.remove('collapsed');
                toggleIcon.textContent = '▼';
            } else {
                categoryContent.classList.add('collapsed');
                toggleIcon.textContent = '▶';
            }
        }

        function updateTotals() {
            let totalItems = 0;
            let totalRetail = 0;
            let totalMyPrice = 0;

            products.forEach((category, catIndex) => {
                category.items.forEach((item, itemIndex) => {
                    const qtyInput = document.getElementById(`qty-${catIndex}-${itemIndex}`);
                    const colorSelect = document.getElementById(`color-${catIndex}-${itemIndex}`);
                    
                    const quantity = parseInt(qtyInput.value) || 0;
                    const color = colorSelect ? colorSelect.value : 'black';

                    const prices = calculatePrices(item.price, quantity, color);

                    document.getElementById(`retail-${catIndex}-${itemIndex}`).textContent = 
                        `$${prices.retailTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                    document.getElementById(`my-${catIndex}-${itemIndex}`).textContent = 
                        `$${prices.myTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                    if (quantity > 0) {
                        const bd = prices.breakdown;
                        let paintText = bd.paint > 0 ? `+ Paint: $${bd.paint.toFixed(2)} ` : '';
                        document.getElementById(`breakdown-retail-${catIndex}-${itemIndex}`).textContent = 
                            `Base: $${bd.retail.toFixed(2)} ${paintText}+ Import: $${bd.import.toFixed(2)} × ${bd.quantity}`;
                        document.getElementById(`breakdown-my-${catIndex}-${itemIndex}`).textContent = 
                            `Base: $${bd.myBase.toFixed(2)} ${paintText}+ Import: $${bd.import.toFixed(2)} × ${bd.quantity}`;
                    } else {
                        document.getElementById(`breakdown-retail-${catIndex}-${itemIndex}`).textContent = '';
                        document.getElementById(`breakdown-my-${catIndex}-${itemIndex}`).textContent = '';
                    }

                    totalItems += quantity;
                    totalRetail += prices.retailTotal;
                    totalMyPrice += prices.myTotal;
                });
            });

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalRetail').textContent = 
                `$${totalRetail.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('totalMyPrice').textContent = 
                `$${totalMyPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('totalSavings').textContent = 
                `$${(totalRetail - totalMyPrice).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        // Initialize
        renderProducts();
        updateTotals();
    </script>
</body>
</html>
