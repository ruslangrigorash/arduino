<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>QuickNotes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366f1' width='100' height='100' rx='20'/><text y='70' x='50' text-anchor='middle' font-size='60' fill='white'>📝</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📝 QuickNotes</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="notes">Notes</button>
            <button class="tab-btn" data-tab="tasks">Tasks</button>
        </div>

        <div class="content-wrapper">
            <!-- Notes Tab -->
            <div class="tab-content active" id="notes-tab">
                <div class="input-section">
                    <textarea 
                        id="noteInput" 
                        placeholder="Write a note..." 
                        rows="3"
                        maxlength="500"
                    ></textarea>
                    <button class="add-btn" id="addNote">+ Add Note</button>
                </div>
                <div class="items-container" id="notesList"></div>
            </div>

            <!-- Tasks Tab -->
            <div class="tab-content" id="tasks-tab">
                <div class="input-section">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="Add a task..." 
                        maxlength="200"
                    >
                    <button class="add-btn" id="addTask">+ Add Task</button>
                </div>
                <div class="items-container" id="tasksList"></div>
            </div>
        </div>

        <footer class="app-footer">
            <div class="stats">
                <span id="noteCount">0 notes</span>
                <span id="taskCount">0 tasks</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
